version: "3.8"

services:
  backend:
    build: ./backend
    container_name: truss-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - API_URL_BASE=http://backend:8000
    container_name: truss-frontend
    environment:
      - NODE_ENV=production
      - API_URL_BASE=http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:stable-alpine
    container_name: truss-nginx
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - backend
      - frontend

networks:
  default:
    name: truss-network
